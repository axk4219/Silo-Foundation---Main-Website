<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.I.L.O. Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <!-- ========== LOGIN GATE ========== -->
  <div class="admin-login" id="loginGate">
    <div class="admin-login__card">
      <h1>S.I.L.O. Admin</h1>
      <p>Enter the admin password to manage site content.</p>
      <input type="password" class="admin-login__input" id="loginPassword" placeholder="Password" autofocus>
      <button class="admin-login__btn" id="loginBtn">Sign In</button>
      <p class="admin-login__error" id="loginError">Incorrect password. Please try again.</p>
    </div>
  </div>

  <!-- ========== ADMIN PANEL ========== -->
  <div class="admin-panel" id="adminPanel">

    <!-- Header -->
    <div class="admin-header">
      <h1>S.I.L.O. Content Manager</h1>
      <button class="admin-header__logout" id="logoutBtn">Log Out</button>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="events">Events</button>
      <button class="admin-tab" data-tab="gallery">Gallery</button>
      <button class="admin-tab" data-tab="merch">Store</button>
      <button class="admin-tab" data-tab="team">Team</button>
      <button class="admin-tab" data-tab="sponsors">Sponsors</button>
      <button class="admin-tab" data-tab="resources">Resources</button>
      <button class="admin-tab" data-tab="hero">Hero Images</button>
    </div>

    <!-- Content -->
    <div class="admin-content">

      <!-- Events Section -->
      <div class="admin-section active" id="section-events">
        <div class="admin-section__header">
          <h2>Upcoming Events</h2>
          <button class="btn-add" onclick="Admin.openForm('events')">+ Add Event</button>
        </div>
        <div class="admin-items" id="items-events"></div>
      </div>

      <!-- Gallery Section -->
      <div class="admin-section" id="section-gallery">
        <div class="admin-section__header">
          <h2>Past Events / Gallery</h2>
          <button class="btn-add" onclick="Admin.openForm('gallery')">+ Add Gallery</button>
        </div>
        <div class="admin-items" id="items-gallery"></div>
      </div>

      <!-- Merch Section -->
      <div class="admin-section" id="section-merch">
        <div class="admin-section__header">
          <h2>Merchandise</h2>
          <button class="btn-add" onclick="Admin.openForm('merch')">+ Add Product</button>
        </div>
        <div class="admin-items" id="items-merch"></div>
      </div>

      <!-- Team Section -->
      <div class="admin-section" id="section-team">
        <div class="admin-section__header">
          <h2>Leadership Team</h2>
          <button class="btn-add" onclick="Admin.openForm('team')">+ Add Member</button>
        </div>
        <div class="admin-items" id="items-team"></div>
      </div>

      <!-- Sponsors Section -->
      <div class="admin-section" id="section-sponsors">
        <div class="admin-section__header">
          <h2>Sponsors & Partners</h2>
          <button class="btn-add" onclick="Admin.openForm('sponsors')">+ Add Sponsor</button>
        </div>
        <div class="admin-items" id="items-sponsors"></div>
      </div>

      <!-- Resources Section -->
      <div class="admin-section" id="section-resources">
        <div class="admin-section__header">
          <h2>Educational Resources</h2>
          <button class="btn-add" onclick="Admin.openForm('resources')">+ Add Resource</button>
        </div>
        <div class="admin-items" id="items-resources"></div>
      </div>

      <!-- Hero Section -->
      <div class="admin-section" id="section-hero">
        <div class="admin-section__header">
          <h2>Hero Images & Text</h2>
        </div>
        <div class="admin-items" id="items-hero"></div>
      </div>

    </div>
  </div>

  <!-- ========== MODAL ========== -->
  <div class="admin-modal" id="adminModal">
    <div class="admin-modal__content">
      <h3 id="modalTitle">Add Item</h3>
      <form id="adminForm"></form>
      <div class="form-actions">
        <button class="btn-cancel" onclick="Admin.closeForm()">Cancel</button>
        <button class="btn-save" onclick="Admin.saveItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="admin-toast" id="adminToast"></div>

  <script src="js/admin.js?v=3"></script>
</body>
</html>
